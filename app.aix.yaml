runtime: python313
service: rps
entrypoint: gunicorn --worker-tmp-dir /tmp -b :$PORT run:app

beta_settings:
  cloud_sql_instances: aix-labs:us-west1:aix-sql

env_variables:
  APP_BASE_PATH: /rps
  AIX_HUB_URL: https://aix-labs.uw.r.appspot.com/
  DATABASE_URL: ""
  DATABASE_URL_SECRET: projects/aix-labs/secrets/rps-database-url/versions/latest
  DB_PATH: /tmp/rps.db
  EVENTS_DIR: gs://aix-labs-data/rps/events
  MODELS_DIR: gs://aix-labs-data/rps/models
  EXPORTS_DIR: gs://aix-labs-data/rps/exports
  TRAINING_EXECUTION_MODE: task_queue
  TASKS_PROJECT_ID: aix-labs
  TASKS_LOCATION: us-west1
  TASKS_QUEUE: rps-training
  TRAINING_WORKER_URL: https://rps-dot-aix-labs.uw.r.appspot.com
  TRAINING_WORKER_TOKEN: ""
  TRAINING_WORKER_TOKEN_SECRET: projects/aix-labs/secrets/rps-worker-token/versions/latest
  INTERNAL_WORKER_TOKEN: ""
  INTERNAL_WORKER_TOKEN_SECRET: projects/aix-labs/secrets/rps-worker-token/versions/latest
  ROUND_EVENT_LOGGING_MODE: auto
  LATENCY_EVENT_LOGGING_MODE: off

service_account: aix-admin@aix-labs.iam.gserviceaccount.com
