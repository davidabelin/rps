<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RPS Agent Lab{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script>
      window.__APP_BASE_PATH__ = {{ (request.script_root or "")|tojson }};
      window.__AIX_HUB_URL__ = {{ aix_hub_url|tojson }};
    </script>
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <header class="site-header">
      <a class="brand" href="{{ url_for('main.home') }}">RPS Agent Lab</a>
      <nav class="site-nav">
        <a href="{{ url_for('main.play_page') }}">Play</a>
        <a href="{{ url_for('main.arena_page') }}">Arena</a>
        <a href="{{ url_for('main.training_page') }}">Training</a>
        <a href="{{ url_for('main.rl_page') }}">RL</a>
        <a href="{{ aix_hub_url }}">Back to AIX Hub</a>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
